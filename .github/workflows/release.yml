name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip python3

      - name: Configure (CMake + emcmake)
        run: |
          cmake --version
          emcc -v
          mkdir -p build
          cd build
          emcmake cmake .. -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build (wasm)
        run: |
          cmake --build build --config RelWithDebInfo -j 2 --target \
            Luau.LuauCeption.Compiler \
            Luau.LuauCeption.VM \
            Luau.LuauCeption.Full

      - name: Install wasm2luau
        run: |
          bash utils/setup_wasm2luau.sh
          chmod +x utils/wasm2luau

      - name: Setup toolchain (Aftman)
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Build Luau outputs (onefile)
        run: |
          lune run ./src/builder -f BUILD_ONEFILE

      - name: Generate Release Notes
        id: notes
        run: |
          set -euo pipefail
          
          UPSTREAM_TAG="$(git -C luau describe --tags --abbrev=0 2>/dev/null || echo UNKNOWN_TAG)"
          
          echo "Fetching release notes for $UPSTREAM_TAG from luau-lang/luau..."
          curl -sL "https://api.github.com/repos/luau-lang/luau/releases/tags/$UPSTREAM_TAG" | jq -r .body > luau_notes.md
          
          if [ ! -s luau_notes.md ] || [ "$(cat luau_notes.md)" = "null" ]; then
            echo "*No upstream release notes found for $UPSTREAM_TAG*" > luau_notes.md
          fi
          
          echo "# LuauCeption Release" > release_body.md
          echo "Updated to Luau version \`$UPSTREAM_TAG\`." >> release_body.md
          echo "" >> release_body.md
          echo "<details><summary><b>Luau Upstream Release Notes</b></summary>" >> release_body.md
          echo "" >> release_body.md
          cat luau_notes.md >> release_body.md
          echo "" >> release_body.md
          echo "</details>" >> release_body.md

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          LUAU_TAG="$(git -C luau describe --tags --abbrev=0 2>/dev/null || echo UNKNOWN_TAG)"
          LUAU_TAG="${LUAU_TAG#v}"

          rm -rf dist
          mkdir -p dist

          # Only include the versioned onefile outputs
          cp -v "output/Luau.LuauCeption.Compiler.${LUAU_TAG}.luau" dist/
          cp -v "output/Luau.LuauCeption.VM.${LUAU_TAG}.luau" dist/
          cp -v "output/Luau.LuauCeption.Full.${LUAU_TAG}.luau" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuauCeption-${{ github.ref_name }}-luau
          path: |
            dist/*.luau
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest' }}
          body_path: release_body.md
          files: |
            dist/*.luau
          fail_on_unmatched_files: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
