name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/emsdk
          key: emsdk-latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip python3

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-wasm-${{ hashFiles('CMakeLists.txt', 'src/**', 'luau/**/*.cmake', 'luau/CMakeLists.txt') }}
          restore-keys: cmake-wasm-

      - name: Configure (CMake + emcmake)
        run: |
          cmake --version
          emcc -v
          mkdir -p build
          cd build
          emcmake cmake .. -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build (wasm)
        run: |
          cmake --build build --config RelWithDebInfo -j 2 --target \
            Luau.LuauCeption.Compiler \
            Luau.LuauCeption.VM \
            Luau.LuauCeption.Full

      - name: Cache wasm2luau
        id: cache-wasm2luau
        uses: actions/cache@v4
        with:
          path: utils/wasm2luau
          key: wasm2luau-v0.13.0

      - name: Install wasm2luau
        if: steps.cache-wasm2luau.outputs.cache-hit != 'true'
        run: |
          bash utils/setup_wasm2luau.sh
          chmod +x utils/wasm2luau

      - name: Cache Aftman tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.aftman
            ~/.cargo/bin/lune
          key: aftman-${{ hashFiles('aftman.toml') }}

      - name: Setup toolchain (Aftman)
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Build Luau outputs (onefile)
        run: |
          lune run ./src/builder -f BUILD_ONEFILE

      - name: Generate Release Notes
        id: notes
        run: |
          set -euo pipefail
          
          UPSTREAM_TAG="$(git -C luau describe --tags --abbrev=0 2>/dev/null || echo UNKNOWN_TAG)"
          echo "luau_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          
          echo "Fetching release notes for $UPSTREAM_TAG from luau-lang/luau..."
          curl -sL "https://api.github.com/repos/luau-lang/luau/releases/tags/$UPSTREAM_TAG" | jq -r .body > luau_notes.md
          
          if [ ! -s luau_notes.md ] || [ "$(cat luau_notes.md)" = "null" ]; then
            echo "*No upstream release notes found for $UPSTREAM_TAG*" > luau_notes.md
          fi
          
          echo "# LuauCeption Release" > release_body.md
          echo "Updated to Luau version \`$UPSTREAM_TAG\`." >> release_body.md
          echo "" >> release_body.md
          echo "<details><summary><b>Luau Upstream Release Notes</b></summary>" >> release_body.md
          echo "" >> release_body.md
          cat luau_notes.md >> release_body.md
          echo "" >> release_body.md
          echo "</details>" >> release_body.md

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist

          # Use glob to find the versioned onefile outputs — the builder uses
          # `git describe --tags` which may include commit distance (e.g. 0.659-5-gabcdef
          # sanitized to 0.659_5_gabcdef), so we match by glob rather than
          # constructing the exact tag string.
          for variant in Compiler VM Full; do
            file=$(ls output/Luau.LuauCeption.${variant}.*.luau 2>/dev/null | grep -v '^output/Luau\.LuauCeption\.[^.]*\.luau$' | head -n1)
            if [ -z "$file" ]; then
              echo "ERROR: No versioned output found for variant $variant"
              exit 1
            fi
            cp -v "$file" dist/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuauCeption-${{ steps.notes.outputs.luau_tag }}-luau
          path: |
            dist/*.luau
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.luau_tag }}
          name: ${{ steps.notes.outputs.luau_tag }}
          body_path: release_body.md
          files: |
            dist/*.luau
          fail_on_unmatched_files: true
          make_latest: true
          prerelease: false
