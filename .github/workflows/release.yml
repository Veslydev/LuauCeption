name: Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip python3

      - name: Configure (CMake + emcmake)
        run: |
          cmake --version
          emcc -v
          mkdir -p build
          cd build
          emcmake cmake .. -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build (wasm)
        run: |
          cmake --build build --config RelWithDebInfo -j 2 --target \
            Luau.LuauCeption.Compiler \
            Luau.LuauCeption.VM \
            Luau.LuauCeption.Full

      - name: Install wasm2luau
        run: |
          bash utils/setup_wasm2luau.sh
          chmod +x utils/wasm2luau

      - name: Setup toolchain (Aftman)
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Build Luau outputs (onefile)
        run: |
          lune run ./src/builder -f BUILD_ONEFILE

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          LUAU_TAG="$(git -C luau describe --tags --abbrev=0 2>/dev/null || echo UNKNOWN_TAG)"
          LUAU_TAG="${LUAU_TAG#v}"

          rm -rf dist
          mkdir -p dist

          # Only include the versioned onefile outputs
          cp -v "output/Luau.LuauCeption.Compiler.${LUAU_TAG}.luau" dist/
          cp -v "output/Luau.LuauCeption.VM.${LUAU_TAG}.luau" dist/
          cp -v "output/Luau.LuauCeption.Full.${LUAU_TAG}.luau" dist/

          zip -r "LuauCeption-${{ github.ref_name }}.zip" dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuauCeption-${{ github.ref_name }}
          path: |
            LuauCeption-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest' }}
          files: |
            LuauCeption-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
